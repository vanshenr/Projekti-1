<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Kauppalista</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Kauppalista</h1>

    <div id="form-container">
        <input type="text" id="itemInput" placeholder="Lisää tuote...">
        <button id="addBtn">Lisää listaan</button>
        <p id="errorMsg"></p>
    </div>

    <div id="filter-buttons">
        <button data-filter="all">Kaikki</button>
        <button data-filter="active">Jäljellä olevat</button>
        <button data-filter="done">Kerätyt</button>
    </div>

    <ul id="shoppingList"></ul>

    <p id="counter"></p>

    <script src="javasc.js"></script>
</body>
</html>
